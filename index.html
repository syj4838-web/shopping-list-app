<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping List</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #F0F3F7;
      --surface:    #FFFFFF;
      --accent:     #1B6B5C;
      --accent-dim: #E4F0EE;
      --text:       #1A2030;
      --text-muted: #7A8799;
      --text-done:  #B0BACA;
      --border:     #DDE3EB;
      --danger:     #C94040;
      --danger-bg:  #FDF0F0;
      --radius:     10px;
      --shadow:     0 2px 16px rgba(26, 32, 48, 0.08);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      font-size: 16px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px 80px;
    }

    /* ── App wrapper ── */
    #app {
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 0 2px;
    }

    h1 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 28px;
      font-weight: normal;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    #item-count {
      font-size: 13px;
      font-variant-numeric: tabular-nums;
      color: var(--text-muted);
      background: var(--border);
      padding: 2px 9px;
      border-radius: 20px;
      transition: background 0.2s, color 0.2s;
    }

    #item-count.has-items {
      background: var(--accent-dim);
      color: var(--accent);
      font-weight: 600;
    }

    /* ── Input form ── */
    #add-form {
      display: flex;
      gap: 8px;
    }

    #item-input {
      flex: 1;
      height: 48px;
      padding: 0 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    #item-input::placeholder { color: var(--text-muted); }

    #item-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(27, 107, 92, 0.12);
    }

    #add-btn {
      height: 48px;
      padding: 0 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
    }

    #add-btn:hover  { background: #155c4e; }
    #add-btn:active { transform: scale(0.97); }
    #add-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* ── List card ── */
    #list-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    /* ── Empty state ── */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 52px 20px;
      gap: 10px;
    }

    #empty-state svg {
      opacity: 0.18;
    }

    #empty-state p {
      color: var(--text-muted);
      font-size: 14px;
    }

    /* ── Shopping list ── */
    #shopping-list {
      list-style: none;
    }

    .list-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      transition: background 0.12s;
      animation: slide-in 0.18s ease;
    }

    .list-item:last-child { border-bottom: none; }
    .list-item:hover { background: #FAFBFC; }

    @keyframes slide-in {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      .list-item { animation: none; }
    }

    /* ── Custom checkbox ── */
    .checkbox-wrap {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      position: relative;
    }

    .checkbox-wrap input[type="checkbox"] {
      position: absolute;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
      margin: 0;
      z-index: 1;
    }

    .checkbox-face {
      width: 22px;
      height: 22px;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, background 0.15s;
      pointer-events: none;
    }

    .checkbox-face svg { opacity: 0; transition: opacity 0.12s; }

    .checkbox-wrap input:checked ~ .checkbox-face {
      background: var(--accent);
      border-color: var(--accent);
    }

    .checkbox-wrap input:checked ~ .checkbox-face svg { opacity: 1; }

    .checkbox-wrap input:focus-visible ~ .checkbox-face {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* ── Item text ── */
    .item-text {
      flex: 1;
      font-size: 15px;
      line-height: 1.4;
      word-break: break-word;
      transition: color 0.18s;
    }

    .list-item.done .item-text {
      color: var(--text-done);
      text-decoration: line-through;
      text-decoration-color: var(--text-done);
    }

    /* ── Delete button ── */
    .delete-btn {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      border-radius: 6px;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.12s, color 0.12s, background 0.12s;
    }

    .list-item:hover .delete-btn,
    .delete-btn:focus-visible {
      opacity: 1;
    }

    .delete-btn:hover {
      color: var(--danger);
      background: var(--danger-bg);
    }

    .delete-btn:focus-visible {
      outline: 2px solid var(--danger);
      outline-offset: 1px;
      opacity: 1;
    }

    /* ── Footer actions ── */
    #footer-actions {
      display: flex;
      justify-content: flex-end;
      padding: 0 2px;
      min-height: 20px;
    }

    #clear-btn {
      background: none;
      border: none;
      font-size: 13px;
      font-family: inherit;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 4px;
      transition: color 0.12s, background 0.12s;
    }

    #clear-btn:hover  { color: var(--danger); background: var(--danger-bg); }
    #clear-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    #clear-btn:disabled { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <h1>Shopping List</h1>
      <span id="item-count">0 items</span>
    </header>

    <form id="add-form" autocomplete="off">
      <input
        type="text"
        id="item-input"
        placeholder="아이템을 입력하세요..."
        maxlength="120"
        aria-label="새 아이템"
      >
      <button type="submit" id="add-btn">추가</button>
    </form>

    <div id="list-card">
      <div id="empty-state">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="10" y="8" width="28" height="34" rx="3" stroke="#1A2030" stroke-width="2.5"/>
          <line x1="16" y1="18" x2="32" y2="18" stroke="#1A2030" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="16" y1="25" x2="32" y2="25" stroke="#1A2030" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="16" y1="32" x2="24" y2="32" stroke="#1A2030" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        <p>리스트가 비어있습니다</p>
      </div>
      <ul id="shopping-list" role="list" aria-label="쇼핑 리스트"></ul>
    </div>

    <div id="footer-actions">
      <button id="clear-btn" disabled>완료 항목 지우기</button>
    </div>
  </div>

  <script>
    const input      = document.getElementById('item-input');
    const form       = document.getElementById('add-form');
    const list       = document.getElementById('shopping-list');
    const emptyState = document.getElementById('empty-state');
    const countBadge = document.getElementById('item-count');
    const clearBtn   = document.getElementById('clear-btn');

    let items = JSON.parse(localStorage.getItem('shopping-items') || '[]');

    function save() {
      localStorage.setItem('shopping-items', JSON.stringify(items));
    }

    function updateMeta() {
      const total   = items.length;
      const checked = items.filter(i => i.done).length;

      countBadge.textContent = total === 0
        ? '0 items'
        : `${total - checked} / ${total}`;
      countBadge.classList.toggle('has-items', total > 0);

      emptyState.style.display = total === 0 ? 'flex' : 'none';
      list.style.display       = total === 0 ? 'none' : 'block';

      clearBtn.disabled = checked === 0;
    }

    function renderItem(item) {
      const li = document.createElement('li');
      li.className = 'list-item' + (item.done ? ' done' : '');
      li.dataset.id = item.id;

      li.innerHTML = `
        <label class="checkbox-wrap" aria-label="${item.done ? '완료 취소' : '완료'}">
          <input type="checkbox" ${item.done ? 'checked' : ''} aria-label="${item.text}">
          <span class="checkbox-face" aria-hidden="true">
            <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
              <polyline points="1.5,5 4.5,8.5 10.5,1.5" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </label>
        <span class="item-text">${escapeHtml(item.text)}</span>
        <button class="delete-btn" aria-label="${item.text} 삭제" title="삭제">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <line x1="2" y1="2" x2="12" y2="12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <line x1="12" y1="2" x2="2" y2="12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
      `;

      li.querySelector('input[type="checkbox"]').addEventListener('change', () => toggleItem(item.id));
      li.querySelector('.delete-btn').addEventListener('click', () => deleteItem(item.id));

      return li;
    }

    function render() {
      list.innerHTML = '';
      items.forEach(item => list.appendChild(renderItem(item)));
      updateMeta();
    }

    function addItem(text) {
      const trimmed = text.trim();
      if (!trimmed) return;
      items.push({ id: Date.now(), text: trimmed, done: false });
      save();
      render();
    }

    function toggleItem(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;
      item.done = !item.done;
      save();

      const li = list.querySelector(`[data-id="${id}"]`);
      if (li) li.classList.toggle('done', item.done);

      updateMeta();
    }

    function deleteItem(id) {
      const li = list.querySelector(`[data-id="${id}"]`);
      if (li) {
        li.style.transition = 'opacity 0.15s, transform 0.15s';
        li.style.opacity = '0';
        li.style.transform = 'translateX(12px)';
        setTimeout(() => {
          items = items.filter(i => i.id !== id);
          save();
          render();
        }, 150);
      }
    }

    function clearDone() {
      items = items.filter(i => !i.done);
      save();
      render();
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    form.addEventListener('submit', e => {
      e.preventDefault();
      addItem(input.value);
      input.value = '';
      input.focus();
    });

    clearBtn.addEventListener('click', clearDone);

    render();
  </script>
</body>
</html>
